<svg width="1280" height="580" viewBox="0 0 1280 580" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <clipPath id="bannerClip4"><rect x="0" y="0" width="1280" height="580" rx="28"/></clipPath>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf5ff"/>
      <stop offset="55%" stop-color="#f6e9ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="titleGrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e454b5"><animate attributeName="stop-color" values="#e454b5;#8b3fe0;#e454b5" dur="5s" repeatCount="indefinite"/></stop>
      <stop offset="50%" stop-color="#8b3fe0"><animate attributeName="stop-color" values="#8b3fe0;#5a1fa8;#8b3fe0" dur="5s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#5a1fa8"><animate attributeName="stop-color" values="#5a1fa8;#e454b5;#5a1fa8" dur="5s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <radialGradient id="orbGrad4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e454b5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8b3fe0" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow4" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .badge4 { opacity: 0; animation: pillIn4 0.55s cubic-bezier(.2,1.2,.4,1) forwards; transform-box: fill-box; transform-origin: center; }
      @keyframes pillIn4 { from {opacity:0; transform: translateY(10px) scale(0.85);} to {opacity:1; transform:translateY(0) scale(1);} }
      .badge4:hover rect { filter: brightness(1.15); }
      .ambient-orb4 { animation: orbPulse4 6s ease-in-out infinite; }
      @keyframes orbPulse4 { 0%,100% { opacity: 0.25; transform: scale(1);} 50% { opacity: 0.5; transform: scale(1.15);} }
      .cursor-blink4 { animation: blink4 1s steps(1) infinite; }
      @keyframes blink4 { 0%,49% { opacity:1;} 50%,100% { opacity:0;} }
      .type-mask-4 rect { animation: typeWidth4 1.6s steps(30,end) forwards; animation-delay: 0.1s; }
      @keyframes typeWidth4 { from { width:0; } to { width: 470px; } }
      .sparkle4 { opacity: 0; animation-name: sparkleTwinkle4; animation-timing-function: ease-in-out; animation-iteration-count: infinite; }
      @keyframes sparkleTwinkle4 { 0%,100% { opacity:0; transform: scale(0.3) rotate(0deg);} 50% { opacity:1; transform: scale(1) rotate(45deg);} }
    </style>
  </defs>

  <g clip-path="url(#bannerClip4)">
    <rect x="0" y="0" width="1280" height="580" fill="url(#bgGrad4)"/>
    <rect x="0" y="0" width="1280" height="580" fill="none" stroke="#d9baff" stroke-width="2" rx="28"/>

    <circle class="ambient-orb4" cx="120" cy="100" r="90" fill="url(#orbGrad4)" opacity="0.35"/>
    <circle class="ambient-orb4" cx="1170" cy="120" r="110" fill="url(#orbGrad4)" opacity="0.3" style="animation-delay:1s"/>
    <circle class="ambient-orb4" cx="1180" cy="530" r="120" fill="url(#orbGrad4)" opacity="0.3" style="animation-delay:2s"/>
    <circle class="ambient-orb4" cx="80" cy="540" r="90" fill="url(#orbGrad4)" opacity="0.3" style="animation-delay:3s"/>

    <g class="sparkle4" style="animation-delay:1.1s; animation-duration:6.4s" transform="translate(1080,220)">
      <path d="M0,-6 L1.6,-1.6 L6,0 L1.6,1.6 L0,6 L-1.6,1.6 L-6,0 L-1.6,-1.6 Z" fill="#e454b5"/>
    </g>
    <g class="sparkle4" style="animation-delay:2.3s; animation-duration:7.0s" transform="translate(80,300)">
      <path d="M0,-6 L1.6,-1.6 L6,0 L1.6,1.6 L0,6 L-1.6,1.6 L-6,0 L-1.6,-1.6 Z" fill="#8b3fe0"/>
    </g>

    <!-- Terminal bar -->
    <g transform="translate(60,50)">
      <rect x="0" y="0" width="470" height="34" rx="8" fill="#2c1350" opacity="0.9"/>
      <circle cx="16" cy="17" r="4" fill="#ff6161"/>
      <circle cx="30" cy="17" r="4" fill="#ffc548"/>
      <circle cx="44" cy="17" r="4" fill="#4ade80"/>
      <g class="type-mask-4">
        <clipPath id="clipStackType"><rect x="0" y="0" width="0" height="34"><animate attributeName="width" from="0" to="410" begin="0.4s" dur="1.6s" fill="freeze" calcMode="linear"/></rect></clipPath>
        <text clip-path="url(#clipStackType)" x="60" y="22" font-family="'Consolas','Courier New',monospace" font-size="15" fill="#ff7fd4">user@dev:~$ cat tech-stack.md</text>
      </g>
      <rect class="cursor-blink4" x="412" y="9" width="9" height="17" fill="#ff7fd4">
        <animate attributeName="x" from="60" to="412" begin="0.4s" dur="1.6s" fill="freeze" calcMode="linear"/>
      </rect>
    </g>

    <!-- Title -->
    <text x="60" y="165" font-family="'Segoe UI', Verdana, sans-serif" font-size="52" font-weight="800" fill="url(#titleGrad4)">TECH STACK</text>
    <text x="60" y="200" font-family="'Segoe UI', Verdana, sans-serif" font-size="17" fill="#7a5ca3">Languages &#8226; AI/ML &#8226; Data &#8226; Tools</text>

    <!-- Row 1 -->
    <g class="badge4" style="animation-delay:0.4s" transform="translate(330,260)">
      <rect width="110" height="50" rx="25" fill="#3776AB"/>
      <circle cx="22" cy="25" r="7" fill="#ffffff" opacity="0.95"/>
      <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">PYTHON</text>
    </g>
    <g class="badge4" style="animation-delay:0.48s" transform="translate(460,260)">
      <rect width="90" height="50" rx="25" fill="#4479A1"/>
      <circle cx="22" cy="25" r="7" fill="#ffffff" opacity="0.95"/>
      <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">SQL</text>
    </g>
    <g class="badge4" style="animation-delay:0.56s" transform="translate(570,260)">
      <rect width="90" height="50" rx="25" fill="#b07219"/>
      <circle cx="22" cy="25" r="7" fill="#ffffff" opacity="0.95"/>
      <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">JAVA</text>
    </g>
    <g class="badge4" style="animation-delay:0.64s" transform="translate(680,260)">
      <rect width="120" height="50" rx="25" fill="#0076A8"/>
      <circle cx="22" cy="25" r="7" fill="#ffffff" opacity="0.95"/>
      <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">MATLAB</text>
    </g>
    <g class="badge4" style="animation-delay:0.72s" transform="translate(820,260)">
      <rect width="130" height="50" rx="25" fill="#000000"/>
      <circle cx="22" cy="25" r="7" fill="#ffffff" opacity="0.95"/>
      <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">VERILOG</text>
    </g>

    <!-- Row 2 -->
    <g class="badge4" style="animation-delay:0.85s" transform="translate(360,340)">
      <rect width="200" height="50" rx="25" fill="#02569B"/>
      <circle cx="22" cy="25" r="7" fill="#ffffff" opacity="0.95"/>
      <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">FLUTTER (DART)</text>
    </g>
    <g class="badge4" style="animation-delay:0.93s" transform="translate(580,340)">
      <rect width="230" height="50" rx="25" fill="#8E75FF"/>
      <circle cx="22" cy="25" r="7" fill="#ffffff" opacity="0.95"/>
      <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">GOOGLE GEMINI AI</text>
    </g>
    <g class="badge4" style="animation-delay:1.01s" transform="translate(830,340)">
      <rect width="90" height="50" rx="25" fill="#ff8ad4"/>
      <circle cx="22" cy="25" r="7" fill="#2c1350" opacity="0.85"/>
      <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#2c1350" letter-spacing="0.5">RAG</text>
    </g>

    <!-- Row 3 -->
    <g class="badge4" style="animation-delay:1.15s" transform="translate(265,420)">
      <rect width="260" height="50" rx="25" fill="#a259ff"/>
      <circle cx="22" cy="25" r="7" fill="#ffffff" opacity="0.95"/>
      <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">PROMPT ENGINEERING</text>
    </g>
    <g class="badge4" style="animation-delay:1.23s" transform="translate(545,420)">
      <rect width="200" height="50" rx="25" fill="#2c3e50"/>
      <circle cx="22" cy="25" r="7" fill="#ffffff" opacity="0.95"/>
      <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">DATA ANALYSIS</text>
    </g>
    <g class="badge4" style="animation-delay:1.31s" transform="translate(765,420)">
      <rect width="250" height="50" rx="25" fill="#e34c26"/>
      <circle cx="22" cy="25" r="7" fill="#ffffff" opacity="0.95"/>
      <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">DATA VISUALIZATION</text>
    </g>

    <!-- Footer neon tagline -->
    <g transform="translate(60,510)">
      <text x="0" y="0" font-family="'Segoe UI', Verdana, sans-serif" font-size="18" font-weight="800"
            fill="none" stroke="#d626b8" stroke-width="1.3" filter="url(#softGlow4)">ALWAYS LEARNING &#8226; ALWAYS BUILDING</text>
      <text x="0" y="0" font-family="'Segoe UI', Verdana, sans-serif" font-size="18" font-weight="800"
            fill="#ff8ad4">ALWAYS LEARNING &#8226; ALWAYS BUILDING</text>
    </g>
  </g>
</svg>
