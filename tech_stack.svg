<svg width="1280" height="580" viewBox="0 0 1280 580" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <clipPath id="bannerClip6"><rect x="0" y="0" width="1280" height="580" rx="28"/></clipPath>
    <clipPath id="boxClip6"><rect x="62" y="237" width="1156" height="246" rx="16"/></clipPath>

    <linearGradient id="bgGrad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf5ff"/>
      <stop offset="55%" stop-color="#f6e9ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="titleGrad6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e454b5"><animate attributeName="stop-color" values="#e454b5;#8b3fe0;#e454b5" dur="5s" repeatCount="indefinite"/></stop>
      <stop offset="50%" stop-color="#8b3fe0"><animate attributeName="stop-color" values="#8b3fe0;#5a1fa8;#8b3fe0" dur="5s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#5a1fa8"><animate attributeName="stop-color" values="#5a1fa8;#e454b5;#5a1fa8" dur="5s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <radialGradient id="orbGrad6" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e454b5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8b3fe0" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow6" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      /* IMPORTANT: the CSS transform animation below is applied ONLY to an inner group
         that has no positional attribute transform of its own. The outer group holds
         the static translate(x,y) placement. Putting both on the same element causes
         the browser to let the CSS transform silently replace the SVG transform
         attribute, which is what collapsed every badge to the same spot before. */
      .badge6 { opacity: 0; animation: pillIn6 0.55s cubic-bezier(.2,1.2,.4,1) forwards; transform-box: fill-box; transform-origin: center; }
      @keyframes pillIn6 { from { opacity:0; transform: translateY(10px) scale(0.85); } to { opacity:1; transform: translateY(0) scale(1); } }
      .badge6:hover rect { filter: brightness(1.15); }
      .ambient-orb6 { animation: orbPulse6 6s ease-in-out infinite; }
      @keyframes orbPulse6 { 0%,100% { opacity: 0.25; transform: scale(1);} 50% { opacity: 0.5; transform: scale(1.15);} }
      .cursor-blink6 { animation: blink6 1s steps(1) infinite; }
      @keyframes blink6 { 0%,49% { opacity:1;} 50%,100% { opacity:0;} }
      .type-mask-6 rect { animation: typeWidth6 1.6s steps(30,end) forwards; animation-delay: 0.1s; }
      @keyframes typeWidth6 { from { width:0; } to { width: 470px; } }
      .sparkle6 { opacity: 0; animation-name: sparkleTwinkle6; animation-timing-function: ease-in-out; animation-iteration-count: infinite; }
      @keyframes sparkleTwinkle6 { 0%,100% { opacity:0; transform: scale(0.3) rotate(0deg);} 50% { opacity:1; transform: scale(1) rotate(45deg);} }
      .box-draw { stroke-dasharray: 2800; stroke-dashoffset: 2800; animation: drawBox6 1.4s ease forwards; animation-delay: 0.15s; }
      @keyframes drawBox6 { to { stroke-dashoffset: 0; } }
    </style>
  </defs>

  <g clip-path="url(#bannerClip6)">
    <rect x="0" y="0" width="1280" height="580" fill="url(#bgGrad6)"/>
    <rect x="0" y="0" width="1280" height="580" fill="none" stroke="#d9baff" stroke-width="2" rx="28"/>

    <circle class="ambient-orb6" cx="120" cy="100" r="90" fill="url(#orbGrad6)" opacity="0.35"/>
    <circle class="ambient-orb6" cx="1170" cy="120" r="110" fill="url(#orbGrad6)" opacity="0.3" style="animation-delay:1s"/>
    <circle class="ambient-orb6" cx="1180" cy="530" r="120" fill="url(#orbGrad6)" opacity="0.3" style="animation-delay:2s"/>
    <circle class="ambient-orb6" cx="80" cy="540" r="90" fill="url(#orbGrad6)" opacity="0.3" style="animation-delay:3s"/>

    <!-- Terminal bar -->
    <g transform="translate(60,50)">
      <rect x="0" y="0" width="470" height="34" rx="8" fill="#2c1350" opacity="0.9"/>
      <circle cx="16" cy="17" r="4" fill="#ff6161"/>
      <circle cx="30" cy="17" r="4" fill="#ffc548"/>
      <circle cx="44" cy="17" r="4" fill="#4ade80"/>
      <g class="type-mask-6">
        <clipPath id="clipStackType6"><rect x="0" y="0" width="0" height="34"><animate attributeName="width" from="0" to="410" begin="0.4s" dur="1.6s" fill="freeze" calcMode="linear"/></rect></clipPath>
        <text clip-path="url(#clipStackType6)" x="60" y="22" font-family="'Consolas','Courier New',monospace" font-size="15" fill="#ff7fd4">user@dev:~$ cat tech-stack.md</text>
      </g>
      <rect class="cursor-blink6" x="412" y="9" width="9" height="17" fill="#ff7fd4">
        <animate attributeName="x" from="60" to="412" begin="0.4s" dur="1.6s" fill="freeze" calcMode="linear"/>
      </rect>
    </g>

    <!-- Title -->
    <text x="60" y="165" font-family="'Segoe UI', Verdana, sans-serif" font-size="52" font-weight="800" fill="url(#titleGrad6)">TECH STACK</text>
    <text x="60" y="200" font-family="'Segoe UI', Verdana, sans-serif" font-size="17" fill="#7a5ca3">Languages &#8226; AI/ML &#8226; Data &#8226; Tools</text>

    <!-- Container box that holds every badge -->
    <rect x="62" y="237" width="1156" height="246" rx="16" fill="#ffffff" fill-opacity="0.55" stroke="#e3c9ff" stroke-width="1.5"/>
    <rect class="box-draw" x="62" y="237" width="1156" height="246" rx="16" fill="none" stroke="url(#titleGrad6)" stroke-width="2"/>

    <g clip-path="url(#boxClip6)">
      <!-- Row 1 -->
      <g transform="translate(90,265)">
        <g class="badge6" style="animation-delay:0.5s">
          <rect width="110" height="50" rx="25" fill="#3776AB"/>
          <circle cx="22" cy="25" r="7" fill="#ffffff" opacity="0.95"/>
          <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">PYTHON</text>
        </g>
      </g>
      <g transform="translate(204,265)">
        <g class="badge6" style="animation-delay:0.56s">
          <rect width="90" height="50" rx="25" fill="#4479A1"/>
          <circle cx="22" cy="25" r="7" fill="#ffffff" opacity="0.95"/>
          <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">SQL</text>
        </g>
      </g>
      <g transform="translate(308,265)">
        <g class="badge6" style="animation-delay:0.62s">
          <rect width="90" height="50" rx="25" fill="#b07219"/>
          <circle cx="22" cy="25" r="7" fill="#ffffff" opacity="0.95"/>
          <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">JAVA</text>
        </g>
      </g>
      <g transform="translate(412,265)">
        <g class="badge6" style="animation-delay:0.68s">
          <rect width="120" height="50" rx="25" fill="#0076A8"/>
          <circle cx="22" cy="25" r="7" fill="#ffffff" opacity="0.95"/>
          <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">MATLAB</text>
        </g>
      </g>
      <g transform="translate(546,265)">
        <g class="badge6" style="animation-delay:0.74s">
          <rect width="130" height="50" rx="25" fill="#000000"/>
          <circle cx="22" cy="25" r="7" fill="#ffffff" opacity="0.95"/>
          <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">VERILOG</text>
        </g>
      </g>

      <!-- Row 2 -->
      <g transform="translate(90,335)">
        <g class="badge6" style="animation-delay:0.9s">
          <rect width="200" height="50" rx="25" fill="#02569B"/>
          <circle cx="22" cy="25" r="7" fill="#ffffff" opacity="0.95"/>
          <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">FLUTTER (DART)</text>
        </g>
      </g>
      <g transform="translate(304,335)">
        <g class="badge6" style="animation-delay:0.96s">
          <rect width="230" height="50" rx="25" fill="#8E75FF"/>
          <circle cx="22" cy="25" r="7" fill="#ffffff" opacity="0.95"/>
          <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">GOOGLE GEMINI AI</text>
        </g>
      </g>
      <g transform="translate(548,335)">
        <g class="badge6" style="animation-delay:1.02s">
          <rect width="90" height="50" rx="25" fill="#ff8ad4"/>
          <circle cx="22" cy="25" r="7" fill="#2c1350" opacity="0.85"/>
          <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#2c1350" letter-spacing="0.5">RAG</text>
        </g>
      </g>

      <!-- Row 3 -->
      <g transform="translate(90,405)">
        <g class="badge6" style="animation-delay:1.15s">
          <rect width="260" height="50" rx="25" fill="#a259ff"/>
          <circle cx="22" cy="25" r="7" fill="#ffffff" opacity="0.95"/>
          <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">PROMPT ENGINEERING</text>
        </g>
      </g>
      <g transform="translate(364,405)">
        <g class="badge6" style="animation-delay:1.21s">
          <rect width="200" height="50" rx="25" fill="#2c3e50"/>
          <circle cx="22" cy="25" r="7" fill="#ffffff" opacity="0.95"/>
          <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">DATA ANALYSIS</text>
        </g>
      </g>
      <g transform="translate(578,405)">
        <g class="badge6" style="animation-delay:1.27s">
          <rect width="250" height="50" rx="25" fill="#e34c26"/>
          <circle cx="22" cy="25" r="7" fill="#ffffff" opacity="0.95"/>
          <text x="40" y="31" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">DATA VISUALIZATION</text>
        </g>
      </g>
    </g>

    <g class="sparkle6" style="animation-delay:1.4s; animation-duration:6.4s" transform="translate(1140,255)">
      <path d="M0,-6 L1.6,-1.6 L6,0 L1.6,1.6 L0,6 L-1.6,1.6 L-6,0 L-1.6,-1.6 Z" fill="#e454b5"/>
    </g>
    <g class="sparkle6" style="animation-delay:2.3s; animation-duration:7.0s" transform="translate(90,465)">
      <path d="M0,-6 L1.6,-1.6 L6,0 L1.6,1.6 L0,6 L-1.6,1.6 L-6,0 L-1.6,-1.6 Z" fill="#8b3fe0"/>
    </g>

    <!-- Footer neon tagline -->
    <g transform="translate(60,530)">
      <text x="0" y="0" font-family="'Segoe UI', Verdana, sans-serif" font-size="18" font-weight="800"
            fill="none" stroke="#d626b8" stroke-width="1.3" filter="url(#softGlow6)">ALWAYS LEARNING &#8226; ALWAYS BUILDING</text>
      <text x="0" y="0" font-family="'Segoe UI', Verdana, sans-serif" font-size="18" font-weight="800"
            fill="#ff8ad4">ALWAYS LEARNING &#8226; ALWAYS BUILDING</text>
    </g>
  </g>
</svg>
