<svg width="1280" height="820" viewBox="0 0 1280 820" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <clipPath id="bannerClip3"><rect x="0" y="0" width="1280" height="820" rx="28"/></clipPath>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf5ff"/>
      <stop offset="55%" stop-color="#f6e9ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="titleGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e454b5"><animate attributeName="stop-color" values="#e454b5;#8b3fe0;#e454b5" dur="5s" repeatCount="indefinite"/></stop>
      <stop offset="50%" stop-color="#8b3fe0"><animate attributeName="stop-color" values="#8b3fe0;#5a1fa8;#8b3fe0" dur="5s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#5a1fa8"><animate attributeName="stop-color" values="#5a1fa8;#e454b5;#5a1fa8" dur="5s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <radialGradient id="orbGrad3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e454b5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8b3fe0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="capGrad3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8ad4"/>
      <stop offset="100%" stop-color="#8b3fe0"/>
    </radialGradient>
    <filter id="softGlow3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .fade-up3 { opacity: 0; animation: fadeUp3 0.7s ease forwards; }
      @keyframes fadeUp3 { from { opacity:0; transform: translateY(14px); } to { opacity:1; transform: translateY(0); } }
      .card-a { animation-delay: 0.5s; } .card-b { animation-delay: 0.9s; } .cert-row { animation-delay: 1.3s; }
      .ambient-orb3 { animation: orbPulse3 6s ease-in-out infinite; }
      @keyframes orbPulse3 { 0%,100% { opacity: 0.25; transform: scale(1);} 50% { opacity: 0.5; transform: scale(1.15);} }
      .cursor-blink3 { animation: blink3 1s steps(1) infinite; }
      @keyframes blink3 { 0%,49% { opacity:1;} 50%,100% { opacity:0;} }
      .type-mask-3 rect { animation: typeWidth3 1.6s steps(30,end) forwards; animation-delay: 0.1s; }
      @keyframes typeWidth3 { from { width:0; } to { width: 520px; } }
      .sparkle3 { opacity: 0; animation-name: sparkleTwinkle3; animation-timing-function: ease-in-out; animation-iteration-count: infinite; }
      @keyframes sparkleTwinkle3 { 0%,100% { opacity:0; transform: scale(0.3) rotate(0deg);} 50% { opacity:1; transform: scale(1) rotate(45deg);} }
      .pill3 { opacity: 0; animation: pillIn3 0.6s ease forwards; transform-box: fill-box; transform-origin: center; }
      @keyframes pillIn3 { from {opacity:0; transform: translateY(8px) scale(0.9);} to {opacity:1; transform:translateY(0) scale(1);} }
    </style>
  </defs>

  <g clip-path="url(#bannerClip3)">
    <rect x="0" y="0" width="1280" height="820" fill="url(#bgGrad3)"/>
    <rect x="0" y="0" width="1280" height="820" fill="none" stroke="#d9baff" stroke-width="2" rx="28"/>

    <circle class="ambient-orb3" cx="130" cy="120" r="90" fill="url(#orbGrad3)" opacity="0.35"/>
    <circle class="ambient-orb3" cx="1160" cy="150" r="110" fill="url(#orbGrad3)" opacity="0.3" style="animation-delay:1s"/>
    <circle class="ambient-orb3" cx="1180" cy="760" r="120" fill="url(#orbGrad3)" opacity="0.3" style="animation-delay:2s"/>
    <circle class="ambient-orb3" cx="90" cy="770" r="90" fill="url(#orbGrad3)" opacity="0.3" style="animation-delay:3s"/>

    <g class="sparkle3" style="animation-delay:1.1s; animation-duration:6.4s" transform="translate(1060,300)">
      <path d="M0,-6 L1.6,-1.6 L6,0 L1.6,1.6 L0,6 L-1.6,1.6 L-6,0 L-1.6,-1.6 Z" fill="#e454b5"/>
    </g>
    <g class="sparkle3" style="animation-delay:2.2s; animation-duration:7.1s" transform="translate(90,470)">
      <path d="M0,-6 L1.6,-1.6 L6,0 L1.6,1.6 L0,6 L-1.6,1.6 L-6,0 L-1.6,-1.6 Z" fill="#8b3fe0"/>
    </g>

    <!-- Terminal bar -->
    <g transform="translate(60,50)">
      <rect x="0" y="0" width="520" height="34" rx="8" fill="#2c1350" opacity="0.9"/>
      <circle cx="16" cy="17" r="4" fill="#ff6161"/>
      <circle cx="30" cy="17" r="4" fill="#ffc548"/>
      <circle cx="44" cy="17" r="4" fill="#4ade80"/>
      <g class="type-mask-3">
        <clipPath id="clipEduType"><rect x="0" y="0" width="0" height="34"><animate attributeName="width" from="0" to="460" begin="0.4s" dur="1.6s" fill="freeze" calcMode="linear"/></rect></clipPath>
        <text clip-path="url(#clipEduType)" x="60" y="22" font-family="'Consolas','Courier New',monospace" font-size="15" fill="#ff7fd4">user@dev:~$ cat education.md</text>
      </g>
      <rect class="cursor-blink3" x="462" y="9" width="9" height="17" fill="#ff7fd4">
        <animate attributeName="x" from="60" to="462" begin="0.4s" dur="1.6s" fill="freeze" calcMode="linear"/>
      </rect>
    </g>

    <!-- Title -->
    <text x="60" y="165" font-family="'Segoe UI', Verdana, sans-serif" font-size="52" font-weight="800" fill="url(#titleGrad3)">EDUCATION</text>
    <text x="60" y="200" font-family="'Segoe UI', Verdana, sans-serif" font-size="17" fill="#7a5ca3">Manav Baisoya &#8226; IIIT Delhi</text>

    <!-- Card A: B.Tech -->
    <g class="fade-up3 card-a">
      <rect x="60" y="250" width="1160" height="150" rx="18" fill="#ffffff" fill-opacity="0.7" stroke="#e3c9ff" stroke-width="1.5"/>
      <circle cx="120" cy="325" r="34" fill="url(#capGrad3)" filter="url(#softGlow3)" opacity="0.9"/>
      <path d="M120,308 L146,320 L120,332 L94,320 Z" fill="#ffffff"/>
      <path d="M120,332 L120,344" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="120" cy="345" r="2.5" fill="#ffffff"/>

      <text x="175" y="295" font-family="'Segoe UI', Verdana, sans-serif" font-size="21" font-weight="800" fill="url(#titleGrad3)">Bachelor of Technology</text>
      <text x="175" y="320" font-family="'Segoe UI', Verdana, sans-serif" font-size="15" fill="#3a1f5c">Electronics and Communication Engineering (ECE)</text>
      <text x="175" y="345" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" fill="#7a5ca3">IIIT Delhi</text>
      <text x="1160" y="295" text-anchor="end" font-family="'Consolas','Courier New',monospace" font-size="13" fill="#d626b8">Undergraduate</text>
    </g>

    <!-- Card B: PGD -->
    <g class="fade-up3 card-b">
      <rect x="60" y="420" width="1160" height="150" rx="18" fill="#ffffff" fill-opacity="0.7" stroke="#e3c9ff" stroke-width="1.5"/>
      <circle cx="120" cy="495" r="34" fill="url(#capGrad3)" filter="url(#softGlow3)" opacity="0.9"/>
      <path d="M120,478 L146,490 L120,502 L94,490 Z" fill="#ffffff"/>
      <path d="M120,502 L120,514" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="120" cy="515" r="2.5" fill="#ffffff"/>

      <text x="175" y="465" font-family="'Segoe UI', Verdana, sans-serif" font-size="21" font-weight="800" fill="url(#titleGrad3)">Post Graduate Diploma</text>
      <text x="175" y="490" font-family="'Segoe UI', Verdana, sans-serif" font-size="15" fill="#3a1f5c">Data Science (PGD-DSHCS)</text>
      <text x="175" y="515" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" fill="#7a5ca3">IIIT Delhi</text>
      <text x="1160" y="465" text-anchor="end" font-family="'Consolas','Courier New',monospace" font-size="13" fill="#d626b8">2025</text>
    </g>

    <!-- Certifications -->
    <g class="fade-up3 cert-row">
      <text x="60" y="620" font-family="'Segoe UI', Verdana, sans-serif" font-size="19" font-weight="800" fill="#5a1fa8">Certifications</text>

      <g class="pill3" style="animation-delay:1.5s">
        <rect x="60" y="640" width="280" height="42" rx="21" fill="#f6e9ff" stroke="#e3c9ff" stroke-width="1.3"/>
        <circle cx="82" cy="661" r="4" fill="#e454b5"/>
        <text x="96" y="666" font-family="'Segoe UI', Verdana, sans-serif" font-size="13" fill="#3a1f5c">Intro to Internet of Things &#8211; NPTEL</text>
      </g>

      <g class="pill3" style="animation-delay:1.65s">
        <rect x="355" y="640" width="280" height="42" rx="21" fill="#f6e9ff" stroke="#e3c9ff" stroke-width="1.3"/>
        <circle cx="377" cy="661" r="4" fill="#8b3fe0"/>
        <text x="391" y="666" font-family="'Segoe UI', Verdana, sans-serif" font-size="13" fill="#3a1f5c">Financial Market &#8211; Coursera</text>
      </g>

      <g class="pill3" style="animation-delay:1.8s">
        <rect x="650" y="640" width="260" height="42" rx="21" fill="#f6e9ff" stroke="#e3c9ff" stroke-width="1.3"/>
        <circle cx="672" cy="661" r="4" fill="#e454b5"/>
        <text x="686" y="666" font-family="'Segoe UI', Verdana, sans-serif" font-size="13" fill="#3a1f5c">Core Java &#8211; Internshala</text>
      </g>

      <g class="pill3" style="animation-delay:1.95s">
        <rect x="925" y="640" width="295" height="42" rx="21" fill="#f6e9ff" stroke="#e3c9ff" stroke-width="1.3"/>
        <circle cx="947" cy="661" r="4" fill="#8b3fe0"/>
        <text x="961" y="666" font-family="'Segoe UI', Verdana, sans-serif" font-size="13" fill="#3a1f5c">DSA in Python &#8211; GfG (2024)</text>
      </g>
    </g>

    <!-- Footer neon tagline -->
    <g transform="translate(60,750)">
      <text x="0" y="0" font-family="'Segoe UI', Verdana, sans-serif" font-size="18" font-weight="800"
            fill="none" stroke="#d626b8" stroke-width="1.3" filter="url(#softGlow3)">LEARN &#8226; BUILD &#8226; ANALYSE &#8226; GROW</text>
      <text x="0" y="0" font-family="'Segoe UI', Verdana, sans-serif" font-size="18" font-weight="800"
            fill="#ff8ad4">LEARN &#8226; BUILD &#8226; ANALYSE &#8226; GROW</text>
    </g>
  </g>
</svg>
