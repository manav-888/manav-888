<svg width="480" height="260" viewBox="0 0 480 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="langsClip"><rect x="0" y="0" width="480" height="260" rx="16"/></clipPath>
    <style>
    .card-in { opacity:0; animation: fadeUp 0.6s ease forwards; }
    @keyframes fadeUp { from {opacity:0; transform:translateY(10px);} to {opacity:1; transform:translateY(0);} }
    .lrow { opacity:0; animation: slideIn 0.5s ease forwards; }
    @keyframes slideIn { from {opacity:0; transform:translateX(-12px);} to {opacity:1; transform:translateX(0);} }
    </style>
  </defs>
  <g clip-path="url(#langsClip)" class="card-in">
    <rect x="0" y="0" width="480" height="260" fill="#1c0e38"/>
    <rect x="0.5" y="0.5" width="479" height="259" rx="16" fill="none" stroke="#5b2a86"/>
    <text x="20" y="28" font-family="Segoe UI, Verdana, sans-serif" font-size="16" font-weight="800" fill="#f5eaff">Most Used Languages</text>
    <g transform="translate(20,44)">
