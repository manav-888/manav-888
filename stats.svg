<svg width="480" height="220" viewBox="0 0 480 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="statsClip"><rect x="0" y="0" width="480" height="220" rx="16"/></clipPath>
    <linearGradient id="statsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff8ad4"/>
      <stop offset="100%" stop-color="#a259ff"/>
    </linearGradient>
    <style>
    .card-in { opacity:0; animation: fadeUp 0.6s ease forwards; }
    @keyframes fadeUp { from {opacity:0; transform:translateY(10px);} to {opacity:1; transform:translateY(0);} }
    .row { opacity:0; animation: slideIn 0.55s ease forwards; }
    @keyframes slideIn { from {opacity:0; transform:translateX(-14px);} to {opacity:1; transform:translateX(0);} }
    .rank-ring { stroke-dasharray: 389.6; stroke-dashoffset: 389.6;
      animation: ringFill 1.4s cubic-bezier(.3,.8,.3,1) forwards; animation-delay: 0.4s; }
    @keyframes ringFill { to { stroke-dashoffset: 54.5; } }
    .rank-label { opacity:0; animation: fadeUp 0.5s ease forwards; animation-delay: 1.6s; }
    </style>
  </defs>
  <g clip-path="url(#statsClip)" class="card-in">
    <rect x="0" y="0" width="480" height="220" fill="#1c0e38"/>
    <rect x="0.5" y="0.5" width="479" height="219" rx="16" fill="none" stroke="#5b2a86"/>
    <text x="20" y="30" font-family="Segoe UI, Verdana, sans-serif" font-size="16" font-weight="800" fill="#f5eaff">Manav's GitHub Stats</text>

    <g transform="translate(20,50)">
      <g class="row" style="animation-delay:0.90s">
      <text x="0" y="42" font-family="Segoe UI, Verdana, sans-serif" font-size="13" fill="#c9b3e8">Total Stars</text>
      <rect x="0" y="50" width="190" height="8" rx="4" fill="#3a1f66"/>
      <rect x="0" y="50" height="8" rx="4" fill="url(#statsGrad)">
        <animate attributeName="width" from="0" to="133.0" begin="1.05s" dur="0.9s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      </rect>
      <text x="204" y="42" font-family="Consolas, monospace" font-size="12" fill="#f5eaff" font-weight="700">312</text>
    </g><g class="row" style="animation-delay:1.08s">
      <text x="0" y="82" font-family="Segoe UI, Verdana, sans-serif" font-size="13" fill="#c9b3e8">Total Commits</text>
      <rect x="0" y="90" width="190" height="8" rx="4" fill="#3a1f66"/>
      <rect x="0" y="90" height="8" rx="4" fill="url(#statsGrad)">
        <animate attributeName="width" from="0" to="171.0" begin="1.23s" dur="0.9s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      </rect>
      <text x="204" y="82" font-family="Consolas, monospace" font-size="12" fill="#f5eaff" font-weight="700">1,846</text>
    </g><g class="row" style="animation-delay:1.26s">
      <text x="0" y="122" font-family="Segoe UI, Verdana, sans-serif" font-size="13" fill="#c9b3e8">Pull Requests</text>
      <rect x="0" y="130" width="190" height="8" rx="4" fill="#3a1f66"/>
      <rect x="0" y="130" height="8" rx="4" fill="url(#statsGrad)">
        <animate attributeName="width" from="0" to="95.0" begin="1.41s" dur="0.9s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      </rect>
      <text x="204" y="122" font-family="Consolas, monospace" font-size="12" fill="#f5eaff" font-weight="700">58</text>
    </g><g class="row" style="animation-delay:1.44s">
      <text x="0" y="162" font-family="Segoe UI, Verdana, sans-serif" font-size="13" fill="#c9b3e8">Issues Closed</text>
      <rect x="0" y="170" width="190" height="8" rx="4" fill="#3a1f66"/>
      <rect x="0" y="170" height="8" rx="4" fill="url(#statsGrad)">
        <animate attributeName="width" from="0" to="85.5" begin="1.59s" dur="0.9s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1"/>
      </rect>
      <text x="204" y="162" font-family="Consolas, monospace" font-size="12" fill="#f5eaff" font-weight="700">41</text>
    </g>
    </g>

    <g transform="translate(375,110)">
      <circle r="62" fill="none" stroke="#3a1f66" stroke-width="10"/>
      <circle class="rank-ring" r="62" fill="none" stroke="url(#statsGrad)" stroke-width="10"
              stroke-linecap="round" transform="rotate(-90)"/>
      <text class="rank-label" text-anchor="middle" dy="8" font-family="Segoe UI, Verdana, sans-serif" font-size="26" font-weight="800" fill="#f5eaff">A+</text>
    </g>
  </g>
</svg>