name: Generate Snake Animation

on:
  schedule:
    # Runs daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate custom-colored snake animation
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: manav-888
          outputs: |
            dist/github-snake.svg?palette=github
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake.gif?color_snake=%23ff8ad4&color_dots=%23241242,%235b2a86,%23a259ff,%23ff8ad4,%23ffffff

      - name: Push snake output to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
