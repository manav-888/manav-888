<svg width="1280" height="1300" viewBox="0 0 1280 1300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <clipPath id="bannerClip2"><rect x="0" y="0" width="1280" height="1300" rx="28"/></clipPath>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf5ff"/>
      <stop offset="55%" stop-color="#f6e9ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="titleGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e454b5"><animate attributeName="stop-color" values="#e454b5;#8b3fe0;#e454b5" dur="5s" repeatCount="indefinite"/></stop>
      <stop offset="50%" stop-color="#8b3fe0"><animate attributeName="stop-color" values="#8b3fe0;#5a1fa8;#8b3fe0" dur="5s" repeatCount="indefinite"/></stop>
      <stop offset="100%" stop-color="#5a1fa8"><animate attributeName="stop-color" values="#5a1fa8;#e454b5;#5a1fa8" dur="5s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <radialGradient id="orbGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e454b5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8b3fe0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dotGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8ad4"/>
      <stop offset="100%" stop-color="#8b3fe0"/>
    </radialGradient>
    <filter id="softGlow2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .fade-up { opacity: 0; animation: fadeUp2 0.7s ease forwards; }
      @keyframes fadeUp2 { from { opacity:0; transform: translateY(14px); } to { opacity:1; transform: translateY(0); } }
      .card1 { animation-delay: 0.5s; } .card2 { animation-delay: 0.9s; } .card3 { animation-delay: 1.3s; } .card4 { animation-delay: 1.7s; }
      .dot-pulse { animation: dotPulse2 2.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      @keyframes dotPulse2 { 0%,100% { opacity:0.6; transform: scale(1);} 50% { opacity:1; transform: scale(1.35);} }
      .ambient-orb2 { animation: orbPulse2 6s ease-in-out infinite; }
      @keyframes orbPulse2 { 0%,100% { opacity: 0.25; transform: scale(1);} 50% { opacity: 0.5; transform: scale(1.15);} }
      .cursor-blink2 { animation: blink2 1s steps(1) infinite; }
      @keyframes blink2 { 0%,49% { opacity:1;} 50%,100% { opacity:0;} }
      .type-mask-2 rect { animation: typeWidth2 1.6s steps(30,end) forwards; animation-delay: 0.1s; }
      @keyframes typeWidth2 { from { width:0; } to { width: 560px; } }
      .sparkle2 { opacity: 0; animation-name: sparkleTwinkle2; animation-timing-function: ease-in-out; animation-iteration-count: infinite; }
      @keyframes sparkleTwinkle2 { 0%,100% { opacity:0; transform: scale(0.3) rotate(0deg);} 50% { opacity:1; transform: scale(1) rotate(45deg);} }
      .timeline-grow { animation: growLine 1.6s ease forwards; animation-delay: 0.3s; }
      @keyframes growLine { from { stroke-dashoffset: 900; } to { stroke-dashoffset: 0; } }
    </style>
  </defs>

  <g clip-path="url(#bannerClip2)">
    <rect x="0" y="0" width="1280" height="1300" fill="url(#bgGrad2)"/>
    <rect x="0" y="0" width="1280" height="1300" fill="none" stroke="#d9baff" stroke-width="2" rx="28"/>

    <circle class="ambient-orb2" cx="120" cy="120" r="90" fill="url(#orbGrad2)" opacity="0.35"/>
    <circle class="ambient-orb2" cx="1160" cy="160" r="110" fill="url(#orbGrad2)" opacity="0.3" style="animation-delay:1s"/>
    <circle class="ambient-orb2" cx="1180" cy="1200" r="120" fill="url(#orbGrad2)" opacity="0.3" style="animation-delay:2s"/>
    <circle class="ambient-orb2" cx="80" cy="1220" r="90" fill="url(#orbGrad2)" opacity="0.3" style="animation-delay:3s"/>

    <g class="sparkle2" style="animation-delay:1.2s; animation-duration:6.5s" transform="translate(1050,260)">
      <path d="M0,-6 L1.6,-1.6 L6,0 L1.6,1.6 L0,6 L-1.6,1.6 L-6,0 L-1.6,-1.6 Z" fill="#e454b5"/>
    </g>
    <g class="sparkle2" style="animation-delay:2.4s; animation-duration:7.2s" transform="translate(70,700)">
      <path d="M0,-6 L1.6,-1.6 L6,0 L1.6,1.6 L0,6 L-1.6,1.6 L-6,0 L-1.6,-1.6 Z" fill="#8b3fe0"/>
    </g>
    <g class="sparkle2" style="animation-delay:0.6s; animation-duration:5.8s" transform="translate(1190,950)">
      <path d="M0,-6 L1.6,-1.6 L6,0 L1.6,1.6 L0,6 L-1.6,1.6 L-6,0 L-1.6,-1.6 Z" fill="#e454b5"/>
    </g>

    <!-- Terminal bar -->
    <g transform="translate(60,50)">
      <rect x="0" y="0" width="560" height="34" rx="8" fill="#2c1350" opacity="0.9"/>
      <circle cx="16" cy="17" r="4" fill="#ff6161"/>
      <circle cx="30" cy="17" r="4" fill="#ffc548"/>
      <circle cx="44" cy="17" r="4" fill="#4ade80"/>
      <g class="type-mask-2">
        <clipPath id="clipExpType"><rect x="0" y="0" width="0" height="34"><animate attributeName="width" from="0" to="500" begin="0.4s" dur="1.6s" fill="freeze" calcMode="linear"/></rect></clipPath>
        <text clip-path="url(#clipExpType)" x="60" y="22" font-family="'Consolas','Courier New',monospace" font-size="15" fill="#ff7fd4">user@dev:~$ cat experience.md</text>
      </g>
      <rect class="cursor-blink2" x="502" y="9" width="9" height="17" fill="#ff7fd4">
        <animate attributeName="x" from="60" to="502" begin="0.4s" dur="1.6s" fill="freeze" calcMode="linear"/>
      </rect>
    </g>

    <!-- Title -->
    <text x="60" y="165" font-family="'Segoe UI', Verdana, sans-serif" font-size="52" font-weight="800" fill="url(#titleGrad2)">EXPERIENCE</text>
    <text x="60" y="200" font-family="'Segoe UI', Verdana, sans-serif" font-size="17" fill="#7a5ca3">Manav Baisoya &#8226; Career Timeline</text>

    <!-- Timeline vertical line -->
    <line x1="90" y1="340" x2="90" y2="1160" stroke="#d9baff" stroke-width="3" stroke-linecap="round" stroke-dasharray="900" class="timeline-grow"/>

    <!-- Card 1 : Senior Analyst -->
    <g class="fade-up card1">
      <circle cx="90" cy="340" r="9" fill="url(#dotGrad2)" class="dot-pulse"/>
      <rect x="130" y="300" width="1100" height="100" rx="18" fill="#ffffff" fill-opacity="0.7" stroke="#e3c9ff" stroke-width="1.5"/>
      <text x="160" y="335" font-family="'Segoe UI', Verdana, sans-serif" font-size="19" font-weight="800" fill="url(#titleGrad2)">Senior Analyst</text>
      <text x="160" y="358" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" fill="#7a5ca3">Vaco Binary Semantics &#8226; Onsite Google</text>
      <text x="1200" y="335" text-anchor="end" font-family="'Consolas','Courier New',monospace" font-size="13" fill="#d626b8">Jan 2025 &#8211; Current</text>
      <text x="1200" y="354" text-anchor="end" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#a98bd6">Gurgaon</text>
      <line x1="160" y1="372" x2="1200" y2="372" stroke="#eeddff" stroke-width="1.5"/>

      
      
      <!-- comment circle <circle cx="168" cy="438" r="2.6" fill="#8b3fe0"/>  -->
       <!-- comment text   <text x="182" y="442" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" fill="#3a1f5c">Reviewed and optimised AIO-generated content paired with Google Ads, ensuring</text> -->
      <!-- comment text <text x="182" y="463" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" fill="#3a1f5c">compliance with quality guidelines and alignment with client objectives.</text> -->

      
    </g>

    <!-- Card 2 : Associate Analyst -->
    <g class="fade-up card2">
      <circle cx="90" cy="500" r="9" fill="url(#dotGrad2)" class="dot-pulse"/>
      <rect x="130" y="460" width="1100" height="100" rx="18" fill="#ffffff" fill-opacity="0.7" stroke="#e3c9ff" stroke-width="1.5"/>
      <text x="160" y="495" font-family="'Segoe UI', Verdana, sans-serif" font-size="19" font-weight="800" fill="url(#titleGrad2)">Associate Analyst</text>
      <text x="160" y="518" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" fill="#7a5ca3">Vaco Binary Semantics &#8226; Onsite Google</text>
      <text x="1200" y="495" text-anchor="end" font-family="'Consolas','Courier New',monospace" font-size="13" fill="#d626b8">November 2024</text>
      <text x="1200" y="514" text-anchor="end" font-family="'Consolas','Courier New',monospace" font-size="12" fill="#a98bd6">Gurgaon</text>
      <line x1="160" y1="532" x2="1200" y2="532" stroke="#eeddff" stroke-width="1.5"/>

      
    </g>

    <!-- Card 3 : Innodata -->
    <g class="fade-up card3">
      <circle cx="90" cy="710" r="9" fill="url(#dotGrad2)" class="dot-pulse"/>
      <rect x="130" y="660" width="1100" height="100" rx="18" fill="#ffffff" fill-opacity="0.7" stroke="#e3c9ff" stroke-width="1.5"/>
      <text x="160" y="695" font-family="'Segoe UI', Verdana, sans-serif" font-size="19" font-weight="800" fill="url(#titleGrad2)">Innodata</text>
      <text x="160" y="718" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" fill="#7a5ca3">Freelancer &#8226; Data Annotation &amp; AI Training</text>
      <text x="1200" y="695" text-anchor="end" font-family="'Consolas','Courier New',monospace" font-size="13" fill="#d626b8">Jan 2026 &#8211; Mar 2026</text>
      <line x1="160" y1="732" x2="1200" y2="732" stroke="#eeddff" stroke-width="1.5"/>

      
    </g>

    <!-- Card 4 : Outlier -->
    <g class="fade-up card4">
      <circle cx="90" cy="910" r="9" fill="url(#dotGrad2)" class="dot-pulse"/>
      <rect x="130" y="880" width="1100" height="100" rx="18" fill="#ffffff" fill-opacity="0.7" stroke="#e3c9ff" stroke-width="1.5"/>
      <text x="160" y="915" font-family="'Segoe UI', Verdana, sans-serif" font-size="19" font-weight="800" fill="url(#titleGrad2)">Outlier</text>
      <text x="160" y="938" font-family="'Segoe UI', Verdana, sans-serif" font-size="14" fill="#7a5ca3">Freelancer &#8226; AI Model Evaluation</text>
      <text x="1200" y="915" text-anchor="end" font-family="'Consolas','Courier New',monospace" font-size="13" fill="#d626b8">Nov 2025 &#8211; Jan 2026</text>
      <line x1="160" y1="952" x2="1200" y2="952" stroke="#eeddff" stroke-width="1.5"/>

      
    </g>

    <!-- Footer neon tagline -->
    <g transform="translate(60,1260)">
      <text x="0" y="0" font-family="'Segoe UI', Verdana, sans-serif" font-size="18" font-weight="800"
            fill="none" stroke="#d626b8" stroke-width="1.3" filter="url(#softGlow2)">SQL &#8226; PYTHON &#8226; DATA ANALYSIS &#8226; GEN AI</text>
      <text x="0" y="0" font-family="'Segoe UI', Verdana, sans-serif" font-size="18" font-weight="800"
            fill="#ff8ad4">SQL &#8226; PYTHON &#8226; DATA ANALYSIS &#8226; GEN AI</text>
    </g>
  </g>
</svg>
